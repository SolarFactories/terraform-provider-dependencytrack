name: Tests

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "LICENSE"
  push:
    branches:
      - main

# Testing only needs permissions to read the repository contents.
permissions:
  contents: "read"
  id-token: "write"

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v .
      - name: Run linters
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      # We need the latest version of Terraform for our documentation generation to use
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make generate' command and commit."; exit 1)

  test_tls:
    name: Terraform Provider TLS Tests
    needs: build
    runs-on: ubuntu-latest
    if: false
    timeout-minutes: 15
    permissions:
      contents: "read"
    services:
      api:
        image: dependencytrack/apiserver:${{ matrix.api }}
        env:
          TELEMETRY_SUBMISSION_ENABLED_DEFAULT: false
        ports:
          - 8081:8080
    strategy:
      fail-fast: false
      matrix:
        api:
          # TLS Connectivity is between TF and Nginx, so is independent of API version.
          # Full API testing is handled in subsequent jobs. Therefore, this can be the latest supported API version.
          - "4.14.2-alpine"
        provider:
          - "default"
          - "rootCA"
          - "mtls"
          - "rootCA+mtls"
        terraform:
          - '1.0.*'
          - '1.1.*'
          - '1.2.*'
          - '1.3.*'
          - '1.4.*'
          - '1.5.*'
          - '1.6.*'
          - '1.7.*'
          - '1.8.*'
          - '1.9.*'
          - '1.10.*'
          - '1.11.*'
          - '1.12.*'
          - '1.13.*'
          - '1.14.*'
          - '1.15.*'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/test
        with:
          terraform_version: ${{ matrix.terraform }}
          provider_config_key: ${{ matrix.provider }}
          # Arbitrarily picked test. Uses Project, as that is the primary resource within DT.
          tests_run_regex: "^TestAccProjectResource$"


  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    needs:
      - build
      #- test_tls
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      api:
        image: dependencytrack/apiserver:${{ matrix.api.version }}
        env:
          # TODO: Use external (to DT) DB
          #ALPINE_DATABASE_MODE: external
          #ALPINE_DATABASE_URL: "jdbc:postgresql://db:5432/dtrack"
          #ALPINE_DATABASE_DRIVER: "org.postgresql.Driver"
          #ALPINE_DATABASE_USERNAME: dtrack
          #ALPINE_DATABASE_PASSWORD: dtrack
          TELEMETRY_SUBMISSION_ENABLED_DEFAULT: false
          # OIDC
          # Alpine requires Sub, Username. Groups claim is only required if team_sync is enabled.
          # Since able to reduce requirements down to info in ID Token, then can ignore absence of `/userinfo` endpoint.
          # Client_ID should match aud in token - when requesting.
          ALPINE_OIDC_ENABLED: true
          ALPINE_OIDC_CLIENT_ID: "terraform-provider-dependencytrack"
          ALPINE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
          ALPINE_OIDC_USERNAME_CLAIM: "sub"
          ALPINE_OIDC_USER_PROVISIONING: true
          ALPINE_OIDC_TEAM_SYNCHRONIZATION: false
          # V5 variables
          DT_OIDC_ENABLED: true
          DT_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
          DT_OIDC_CLIENT_ID: "terraform-provider-dependencytrack"
          DT_OIDC_USERNAME_CLAIM: "sub"
          DT_OIDC_USER_PROVISIONING: true
          DT_OIDC_TEAM_SYNCHRONIZATION: false

        ports:
          - 8081:8080
#      db:
#        image: postgres:17-alpine
