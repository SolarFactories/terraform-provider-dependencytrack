volumes:
  dependency-track: {}
  postgres-data: {}

services:
  dtrack-apiserver:
    image: dependencytrack/apiserver:latest-alpine
    depends_on:
      dtrack-postgres:
        condition: service_healthy
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_URL: "jdbc:postgresql://dtrack-postgres:5432/dtrack"
      ALPINE_DATABASE_DRIVER: "org.postgresql.Driver"
      ALPINE_DATABASE_USERNAME: dtrack
      ALPINE_DATABASE_PASSWORD: dtrack
      TELEMETRY_SUBMISSION_ENABLED_DEFAULT: false
      # OIDC
      # Alpine requires Sub, Username. Groups claim is only required if team_sync is enabled.
      # Since able to reduce requirements down to info in ID Token, then can ignore absence of `/userinfo` endpoint.
      # Client_ID should match aud in token - when requesting.
      ALPINE_OIDC_ENABLED: true
      ALPINE_OIDC_CLIENT_ID: "terraform-provider-dependencytrack"
      ALPINE_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
      ALPINE_OIDC_USERNAME_CLAIM: "sub"
      ALPINE_OIDC_USER_PROVISIONING: true
      ALPINE_OIDC_TEAM_SYNCHRONIZATION: false

    deploy:
      resources:
        limits:
          memory: 12288m
        reservations:
          memory: 8192m
      restart_policy:
        condition: on-failure
    ports:
      - '8081:8080'
    volumes:
      - 'dependency-track:/data'
    restart: unless-stopped

  dtrack-frontend:
    image: dependencytrack/frontend
    depends_on:
      - dtrack-apiserver
    environment:
      API_BASE_URL: "http://localhost:8081"
      OIDC_ISSUER: "https://token.actions.githubusercontent.com"
      OIDC_CLIENT_ID: "terraform-provider-dependencytrack"
    ports:
      - "8080:8080"
    restart: unless-stopped

  dtrack-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: dtrack
      POSTGRES_PASSWORD: dtrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    restart: unless-stopped
